<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're on the list! — PrediCare AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#08121F;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
.card{background:#0F1E33;border:1px solid rgba(0,196,176,0.2);border-radius:24px;padding:56px 48px;max-width:480px;width:100%;}
.icon{font-size:72px;margin-bottom:24px;}
h1{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;letter-spacing:-1px;margin-bottom:12px;}
h1 span{color:#00C4B0;}
p{font-size:15px;color:#94A3B8;line-height:1.75;margin-bottom:28px;}
.badge{background:rgba(0,196,176,0.08);border:1px solid rgba(0,196,176,0.2);border-radius:10px;padding:14px 20px;font-size:14px;color:#00C4B0;font-weight:600;margin-bottom:28px;}
.btn{display:block;background:#00C4B0;color:#08121F;padding:16px 32px;border-radius:10px;font-weight:700;font-size:15px;text-decoration:none;margin-bottom:12px;transition:background 0.2s;}
.btn:hover{background:#00E5CE;}
.btn-outline{display:block;color:#94A3B8;padding:12px;font-size:14px;text-decoration:none;transition:color 0.2s;}
.btn-outline:hover{color:#fff;}
@keyframes pop{0%{transform:scale(0.8);opacity:0}100%{transform:scale(1);opacity:1}}
.card{animation:pop 0.4s ease both;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🎉</div>
  <h1>You're on the<br><span>waitlist!</span></h1>
  <p>We'll reach out via WhatsApp or email the moment PrediCare AI launches. You're getting <strong style="color:#fff;">3 months Premium free</strong> as a beta user.</p>
  <div class="badge">✓ Spot confirmed · Beta access reserved</div>
  <a href="assess.html" class="btn">🔬 Try the free risk assessment now →</a>
  <a href="index.html" class="btn-outline">← Back to homepage</a>
</div>
</body>
</html>
